# -- CWInPy CI/CD configuration --

# Configure the workflow to run when we want it
workflow:
  rules:
    # Run for merge requests
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Don't run on branches if there's an open merge request
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Run on branches and tags
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

include:
  - component: git.ligo.org/computing/gitlab/components/python/all@4
    inputs:
      merge_request_pipelines: true
      code_quality_analyzer: flake8
      dependency_scanning: false
      python_versions:
        - "3.9"
        - "3.10"
        - "3.11"

  # Configure dependency scanning manually to use uv.lock generated below
  - component: git.ligo.org/components/dependency-scanning/main@~latest
    inputs:
      job_name: dependency_scanning

# -- Dependency scanning

# Use pixi and uv together to create a lockfile with the
# lowest direct dependencies to be used for dependency scanning
uv_lock:
  stage: .pre
  image: ghcr.io/prefix-dev/pixi:latest
  variables:
    PYTHON_VERSION: "3.9"
  script:
    - pixi add --frozen python=${PYTHON_VERSION} uv
    - pixi install
    - pixi run uv venv --python .pixi/envs/default/bin/python --system-site-packages
    - pixi run uv lock --resolution lowest-direct
  artifacts:
    paths:
      - pixi.lock
      - uv.lock
    expire_in: 1 week

# Scan using the uv lock file
dependency_scanning:
  needs: [uv_lock]

# -- Testing

# Use pixi to manage the python environment and dependencies, and run the tests
python_test:
  image: ghcr.io/prefix-dev/pixi:latest
  # use pixi to manage the python environment and dependencies
  script:
    # Add pinned Python version to pixi config
    - pixi add python=${PYTHON_VERSION} --frozen
    # Install dependencies
    - pixi install
    # Install the project
    - pixi run pip install -e .
    # List the packages
    - pixi list --fields name,version,build,kind
    # Run the tests
    - pixi run pytest
        --cov=cwinpy
        --cov-report=xml:coverage.xml
        --junit-xml=junit.xml
        --pyargs
        -ra
        cwinpy.test

# Add an extra job to run the tests with the minimum dependencies
python_test_min:
  extends: python_test
  parallel: null
  needs: [uv_lock]
  variables:
    PYTHON_VERSION: "3.9"
